# ABOUTME: CI workflow that validates the documented issue-86 onboarding path without relying on unrelated repo-wide baseline failures.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  onboarding:
    runs-on: ubuntu-latest
    env:
      SKIP_STAR_PROMPT: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prepare documented local env
        run: |
          cp .env.example .env
          node -e "const fs=require('fs'); const path='.env'; let env=fs.readFileSync(path,'utf8'); if(/^DASHBOARD_KEY=$/m.test(env)){ env=env.replace(/^DASHBOARD_KEY=$/m, 'DASHBOARD_KEY=ci-test-key'); } else if(!/^DASHBOARD_KEY=/m.test(env)){ env += '\nDASHBOARD_KEY=ci-test-key\n'; } fs.writeFileSync(path, env);"

      - name: Verify star prompt suppression
        run: npx vitest run tests/postinstall-star.test.ts

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Start documented local Postgres
        run: docker compose up postgres -d

      - name: Wait for Postgres
        run: until docker compose exec -T postgres pg_isready -U namuh >/dev/null 2>&1; do sleep 1; done

      - name: Push schema with documented local DATABASE_URL
        run: npx drizzle-kit push --config drizzle.config.ts

      - name: Seed sample data
        run: npx tsx scripts/seed.ts

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v
