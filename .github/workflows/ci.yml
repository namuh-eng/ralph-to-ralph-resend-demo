# ABOUTME: CI workflow that runs typecheck, lint, and unit tests on every PR.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: namuh
          POSTGRES_PASSWORD: namuh
          POSTGRES_DB: namuh_send
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U namuh"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://namuh:namuh@localhost:5432/namuh_send
      DASHBOARD_KEY: ci-test-key
      SKIP_STAR_PROMPT: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: make check

      - run: make test
