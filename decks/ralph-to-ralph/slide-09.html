<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0f0f0f;
      padding: 28pt 36pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #dc2626; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">LIVE DEMO</p>
      <h2 style="font-size: 18pt; font-weight: 600; color: #ffffff;">Watch It Work</h2>
    </div>
    <p style="font-size: 10pt; color: #666;">09</p>
  </div>

  <!-- Video container -->
  <div style="flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <div style="width: 100%; height: 100%; border-radius: 8pt; overflow: hidden; border: 1px solid #333; background: #1a1a1a; display: flex; align-items: center; justify-content: center;">
      <video src="./assets/demo-recording.mov" controls style="width: 100%; height: 100%; object-fit: contain; background: #000;">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <!-- Caption -->
  <div style="display: flex; justify-content: center; padding-top: 10pt;">
    <p style="font-size: 10pt; color: #b0b0b0; text-align: center;">
      Ralph-to-Ralph cloning pipeline in action — from URL to deployed product
    </p>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 8pt; border-top: 1px solid #252525;">
    <p style="font-size: 9pt; color: #666;">Ralph-to-Ralph — Jaeyun Ha · Ashley Ha</p>
    <p style="font-size: 9pt; color: #666;">github.com/jaeyunha/ralph-to-ralph-prod</p>
    <p style="font-size: 9pt; color: #666;">Ralphthon Seoul 2026</p>
  </div>
</body>
</html>
