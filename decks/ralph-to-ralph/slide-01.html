<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0f0f0f;
      padding: 32pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 16pt;">
      <div style="display: flex; align-items: center; gap: 8pt;">
        <div style="width: 18pt; height: 18pt; background: #ffffff; border-radius: 3pt; display: flex; align-items: center; justify-content: center;">
          <p style="color: #0f0f0f; font-size: 10pt; font-weight: 700;">R</p>
        </div>
        <p style="font-size: 11pt; font-weight: 600; color: #ffffff;">Ralph-to-Ralph</p>
      </div>
      <p style="display: inline-block; padding: 4pt 10pt; border: 1px solid #555; border-radius: 12pt; font-size: 9pt; font-weight: 500; color: #b0b0b0;">RALPHTHON SEOUL 2026</p>
    </div>
    <div style="display: flex; align-items: center; gap: 8pt;">
      <p style="display: inline-block; padding: 4pt 10pt; border: 1px solid #555; border-radius: 12pt; font-size: 9pt; font-weight: 500; color: #b0b0b0;">MID-PRESENTATION</p>
    </div>
  </div>

  <!-- Main Title -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
    <p style="font-size: 12pt; font-weight: 600; color: #6366f1; letter-spacing: 0.1em; margin-bottom: 12pt;">AUTONOMOUS PRODUCT CLONING LOOP</p>
    <h1 style="font-size: 52pt; font-weight: 600; color: #ffffff; letter-spacing: -0.02em; line-height: 1.2;">
      Ralph-to-Ralph
    </h1>
    <p style="font-size: 16pt; color: #b0b0b0; margin-top: 20pt; line-height: 1.5;">
      Give it any URL → It inspects, builds, tests, and deploys a working clone.
    </p>
  </div>

  <!-- Footer -->
  <div style="display: flex; gap: 64pt;">
    <div>
      <p style="font-size: 9pt; color: #666; margin-bottom: 4pt;">Team</p>
      <p style="font-size: 11pt; font-weight: 500; color: #ffffff;">Jaeyun Ha · Ashley Ha</p>
    </div>
    <div>
      <p style="font-size: 9pt; color: #666; margin-bottom: 4pt;">Date</p>
      <p style="font-size: 11pt; font-weight: 500; color: #ffffff;">March 2026</p>
    </div>
    <div>
      <p style="font-size: 9pt; color: #666; margin-bottom: 4pt;">GitHub</p>
      <p style="font-size: 11pt; font-weight: 500; color: #ffffff;">github.com/jaeyunha/ralph-to-ralph-prod</p>
    </div>
  </div>

</html>
