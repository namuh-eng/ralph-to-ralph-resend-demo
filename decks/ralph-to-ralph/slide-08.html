<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0f0f0f;
      padding: 28pt 36pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #22c55e; color: #0f0f0f; border-radius: 4pt; font-size: 8pt; font-weight: 600;">PROOF</p>
      <h2 style="font-size: 18pt; font-weight: 600; color: #ffffff;">It Actually Works — End to End</h2>
    </div>
    <p style="font-size: 10pt; color: #666;">08</p>
  </div>

  <!-- 2x2 grid -->
  <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8pt; overflow: hidden;">
    <!-- API Keys - hero proof -->
    <div style="border-radius: 6pt; overflow: hidden; border: 2px solid #22c55e; position: relative;">
      <img src="./assets/screenshot-api-keys-page.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="API Keys page">
      <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 6pt 8pt;">
        <p style="font-size: 8pt; color: #22c55e; font-weight: 600;">REAL API KEYS CONFIGURED</p>
      </div>
    </div>
    <!-- Dashboard -->
    <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333; position: relative;">
      <img src="./assets/screenshot-dashboard.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Dashboard">
      <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 6pt 8pt;">
        <p style="font-size: 8pt; color: #b0b0b0;">Full email dashboard</p>
      </div>
    </div>
    <!-- Welcome email -->
    <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333; position: relative;">
      <img src="./assets/screenshot-welcome-email.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Welcome email">
      <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 6pt 8pt;">
        <p style="font-size: 8pt; color: #b0b0b0;">React email components</p>
      </div>
    </div>
    <!-- Broadcast -->
    <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333; position: relative;">
      <img src="./assets/screenshot-broadcast.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Broadcast sent">
      <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 6pt 8pt;">
        <p style="font-size: 8pt; color: #b0b0b0;">Broadcast to 3,200 contacts</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 8pt; border-top: 1px solid #252525;">
    <p style="font-size: 9pt; color: #666;">Ralph-to-Ralph</p>
    <p style="font-size: 9pt; color: #22c55e;">Real API keys · Real emails · Real infra</p>
    <p style="font-size: 9pt; color: #666;">Ralphthon Seoul 2026</p>
  </div>
</body>
</html>
