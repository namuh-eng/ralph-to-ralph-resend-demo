<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0f0f0f;
      padding: 28pt 36pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #6366f1; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">DEMO</p>
      <h2 style="font-size: 18pt; font-weight: 600; color: #ffffff;">The Resend Clone — In Production</h2>
    </div>
    <p style="font-size: 10pt; color: #666;">08</p>
  </div>

  <!-- Screenshots grid: 1 large + 4 small -->
  <div style="flex: 1; display: grid; grid-template-columns: 1.2fr 1fr; gap: 10pt; overflow: hidden;">
    <!-- Left: Dashboard (large) -->
    <div style="display: flex; flex-direction: column; gap: 6pt;">
      <div style="flex: 1; border-radius: 6pt; overflow: hidden; border: 1px solid #333;">
        <img src="./assets/screenshot-dashboard.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Resend clone dashboard">
      </div>
      <p style="font-size: 8pt; color: #888; text-align: center;">Dashboard — emails list with full send/receive functionality</p>
    </div>

    <!-- Right: 4 email notifications stacked in 2x2 -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8pt;">
      <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333;">
        <img src="./assets/screenshot-welcome-email.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Welcome email">
      </div>
      <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333;">
        <img src="./assets/screenshot-broadcast.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Broadcast notification">
      </div>
      <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333;">
        <img src="./assets/screenshot-tls.png" style="width: 100%; height: 100%; object-fit: cover;" alt="TLS enforcement">
      </div>
      <div style="border-radius: 6pt; overflow: hidden; border: 1px solid #333;">
        <img src="./assets/screenshot-export.png" style="width: 100%; height: 100%; object-fit: cover;" alt="CSV export ready">
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 10pt; border-top: 1px solid #252525;">
    <p style="font-size: 9pt; color: #666;">Ralph-to-Ralph</p>
    <p style="font-size: 9pt; color: #b0b0b0;">Real emails sent via AWS SES · Live on App Runner</p>
    <p style="font-size: 9pt; color: #666;">Ralphthon Seoul 2026</p>
  </div>
</body>
</html>
