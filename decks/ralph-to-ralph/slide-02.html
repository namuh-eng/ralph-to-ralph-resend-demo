<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0f0f0f;
      padding: 28pt 36pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #6366f1; color: #fff; border-radius: 4pt; font-size: 8pt; font-weight: 600;">OVERVIEW</p>
      <h2 style="font-size: 18pt; font-weight: 600; color: #ffffff;">Architecture</h2>
    </div>
    <p style="font-size: 10pt; color: #666;">02</p>
  </div>

  <!-- Architecture diagram -->
  <div style="flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <div style="width: 100%; height: 100%; border-radius: 8pt; overflow: hidden; border: 1px solid #333; background: #ffffff;">
      <img src="./assets/architecture-diagram.png" style="width: 100%; height: 100%; object-fit: contain;" alt="Ralph-to-Ralph Architecture Diagram">
    </div>
  </div>

  <!-- Footer -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 10pt; border-top: 1px solid #252525;">
    <p style="font-size: 9pt; color: #666;">Ralph-to-Ralph</p>
    <p style="font-size: 9pt; color: #b0b0b0;">Give it any URL → deployed working clone</p>
    <p style="font-size: 9pt; color: #666;">Ralphthon Seoul 2026</p>
  </div>
</body>
</html>
