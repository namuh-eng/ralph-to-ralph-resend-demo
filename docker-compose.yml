services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: namuh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-namuh}
      POSTGRES_DB: namuh_send
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namuh"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://namuh:${POSTGRES_PASSWORD:-namuh}@postgres:5432/namuh_send
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "${PORT:-3015}:8080"
    environment:
      DATABASE_URL: postgresql://namuh:${POSTGRES_PASSWORD:-namuh}@postgres:5432/namuh_send
      DASHBOARD_KEY: ${DASHBOARD_KEY:?Set DASHBOARD_KEY in .env}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ingester:
    build:
      context: .
      dockerfile: packages/ingester/Dockerfile
    restart: unless-stopped
    ports:
      - "3016:3016"
    environment:
      DATABASE_URL: postgresql://namuh:${POSTGRES_PASSWORD:-namuh}@postgres:5432/namuh_send
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
